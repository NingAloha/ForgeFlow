name: Branch Path Guard

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "track/**"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Branch Path Guard
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          BASE_REF: origin/main
        run: |
          bash scripts/branch_path_guard.sh
